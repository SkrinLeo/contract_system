<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Система договоров</title>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <h1>Система учета договоров</h1>

    <div class="form">

        <input id="number" type="text" placeholder="Номер договора">
        <input id="title" type="text" placeholder="Название">
        <input id="contractor" type="text" placeholder="Контрагент">
        <input id="amount" type="number" placeholder="Сумма">
        <input id="status" type="text" placeholder="Статус">

        <button onclick="addContract()">Добавить договор</button>

    </div>

    <table>

        <thead>
            <tr>
                <th>Номер</th>
                <th>Название</th>
                <th>Контрагент</th>
                <th>Сумма</th>
                <th>Статус</th>
                <th>Действия</th>
            </tr>
        </thead>

        <tbody id="tableBody">
        </tbody>

    </table>

</div>

<script>

const API = "http://127.0.0.1:8000/contracts";

// ЗАГРУЗКА ВСЕХ ДОГОВОРОВ
async function loadContracts() {
    const res = await fetch(API);
    const data = await res.json();

    const table = document.getElementById("tableBody");
    table.innerHTML = "";

    data.forEach(c => {
        table.innerHTML += `
            <tr>
                <td>${c.number}</td>
                <td>${c.title}</td>
                <td>${c.contractor}</td>
                <td>${c.amount}</td>
                <td>${c.status}</td>
                <td>
                    <button onclick="deleteContract('${c.number}')">Удалить</button>
                </td>
            </tr>
        `;
    });
}

// ДОБАВЛЕНИЕ ДОГОВОРА
async function addContract() {

    const contract = {
        number: document.getElementById("number").value,
        title: document.getElementById("title").value,
        contractor: document.getElementById("contractor").value,
        amount: parseFloat(document.getElementById("amount").value),
        status: document.getElementById("status").value,
        created_at: "2026-01-01",
        end_date: "2026-12-31"
    };

    await fetch(API + "/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(contract)
    });

    // очистка полей
    document.getElementById("number").value = "";
    document.getElementById("title").value = "";
    document.getElementById("contractor").value = "";
    document.getElementById("amount").value = "";
    document.getElementById("status").value = "";

    loadContracts();
}

// УДАЛЕНИЕ ДОГОВОРА
async function deleteContract(number) {
    await fetch(`${API}/${number}`, {
        method: "DELETE"
    });

    loadContracts();
}

// ПЕРВАЯ ЗАГРУЗКА
loadContracts();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система договоров</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <header>
        Система учета договоров
    </header>

    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="contractsCount">0</div>
                <div>Всего договоров</div>
            </div>
        </div>

        <div class="card">
            <h2>Добавить договор</h2>
            <div class="form">
                <input id="number" placeholder="Номер договора">
                <input id="title" placeholder="Название">
                <input id="contractor" placeholder="Контрагент">
                <input id="amount" placeholder="Сумма" type="number" step="0.01">
                <button class="add-btn" id="addBtn" type="button">
                    Добавить договор
                </button>
            </div>
            <div class="error" id="formError"></div>
        </div>

        <div class="card">
            <h2>Поиск договоров</h2>
            <input
                class="search"
                id="searchInput"
                placeholder="Введите номер или название договора..."
            >
        </div>

        <div class="card">
            <h2>Список договоров</h2>
            <table>
                <thead>
                    <tr>
                        <th>Номер</th>
                        <th>Название</th>
                        <th>Контрагент</th>
                        <th>Сумма</th>
                        <th>Статус</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="contractsTable"></tbody>
            </table>
        </div>
    </div>

    <script src="static/app.js"></script>
</body>
</html>
